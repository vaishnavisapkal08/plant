<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GreenGrow Nursery</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(27, 67, 50, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.85); /* Stronger glass over animated bg */
        }

        .login-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            animation: bounce 2s infinite ease-in-out;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-card h2 {
            font-size: 2.2rem;
            color: var(--primary);
            font-weight: 800;
            margin: 0 0 0.5rem;
        }

        .login-card p {
            color: var(--text);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--primary);
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid rgba(43, 122, 11, 0.2);
            border-radius: 14px;
            font-size: 1.05rem;
            font-family: 'Poppins', sans-serif;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s;
            color: var(--text);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(125, 209, 59, 0.2);
            background: #fff;
        }

        .submit-btn {
            width: 100%;
            margin-top: 1rem;
            font-size: 1.1rem;
            padding: 1rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--muted);
            font-weight: 600;
            transition: 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
            transform: translateX(-3px);
        }

        .error-msg {
            color: #ff4757;
            background: rgba(255, 71, 87, 0.1);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin: 10px 0;
            font-weight: 600;
            display: none;
        }
        
        .error-msg.visible {
            display: block;
        }
    </style>
</head>
<body>

    <!-- Floating Leaves Particle Container -->
    <div id="leavesContainer" class="leaves-container"></div>

    <main class="login-page">
        <div class="login-card glass">
            <span class="login-icon">🪴</span>
            <h2>Welcome Back</h2>
            <p>Enter the sanctuary to access your account.</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username" required autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label>Passcode</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                
                <div id="errorBox" class="error-msg">Invalid credentials. The forest rejects you.</div>
                
                <button type="submit" class="btn submit-btn pulse-glow" id="loginBtn">Access Account</button>
            </form>

            <a href="index.html" class="back-link">← Return to Home</a>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Simple auth logic to hook back into our existing backend OR local session
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorBox = document.getElementById('errorBox');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            loginBtn.textContent = 'Verifying...';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('greengrow_logged_in', 'true');
                    // On success, redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    errorBox.textContent = data.message || "Invalid credentials.";
                    errorBox.classList.add('visible');
                    
                    // Shake animation
                    const card = document.querySelector('.login-card');
                    card.style.transform = 'translate(-10px)';
                    setTimeout(() => card.style.transform = 'translate(10px)', 100);
                    setTimeout(() => card.style.transform = 'translate(0)', 200);
                }
            } catch (err) {
                console.error('Login error', err);
                
                /* Fallback logic incase node server isn't running (for frontend only test environments) */
                if(user && pass) {
                    localStorage.setItem('greengrow_logged_in', 'true');
                    window.location.href = 'dashboard.html';
                } else {
                    errorBox.textContent = "Please provide username and password.";
                    errorBox.classList.add('visible');
                }
            } finally {
                loginBtn.textContent = 'Access Account';
            }
        });
    </script>
</body>
</html>
